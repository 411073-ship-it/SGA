<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文背單字軟體</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- 導航欄 -->
        <nav class="navbar">
            <div class="nav-content">
                <h1 class="app-title">📚 英文背單字</h1>
                <div class="nav-buttons">
                    <button class="nav-btn active" data-page="learning">學習</button>
                    <button class="nav-btn" data-page="management">管理單字</button>
                </div>
            </div>
        </nav>

        <!-- 學習頁面 -->
        <div id="learning-page" class="page active">
            <div class="learning-container">
                <!-- 卡片容器 -->
                <div class="card-wrapper">
                    <div class="flashcard" id="flashcard">
                        <div class="card-front">
                            <div class="card-content">
                                <p class="card-label">英文單字</p>
                                <p class="card-word" id="card-word">Click to load</p>
                            </div>
                        </div>
                        <div class="card-back">
                            <div class="card-content">
                                <div class="card-back-item">
                                    <p class="back-label">中文翻譯</p>
                                    <p class="back-text" id="card-translation">-</p>
                                </div>
                                <div class="card-back-item">
                                    <p class="back-label">詞性</p>
                                    <p class="back-text" id="card-pos">-</p>
                                </div>
                                <div class="card-back-item">
                                    <p class="back-label">字根分析</p>
                                    <p class="back-text" id="card-root">-</p>
                                </div>
                                <div class="card-back-item">
                                    <p class="back-label">例句</p>
                                    <p class="back-text" id="card-example">-</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 控制按鈕 -->
                <div class="card-controls">
                    <button class="control-btn" id="prev-btn">← 上一個</button>
                    <span class="card-counter"><span id="current-index">1</span> / <span id="total-count">0</span></span>
                    <button class="control-btn" id="next-btn">下一個 →</button>
                </div>

                <!-- 提示信息 -->
                <div class="hint-text" id="hint-text">點擊卡片查看答案</div>
            </div>
        </div>

        <!-- 管理頁面 -->
        <div id="management-page" class="page">
            <div class="management-container">
                <h2>新增英文單字</h2>
                
                <!-- 表單 -->
                <form class="word-form" id="word-form">
                    <div class="form-group">
                        <label for="word-input">英文單字 *</label>
                        <div class="input-with-btn">
                            <input 
                                type="text" 
                                id="word-input" 
                                placeholder="輸入英文單字" 
                                required
                            >
                            <button 
                                type="button" 
                                class="auto-fill-btn" 
                                id="auto-fill-btn"
                                title="自動填入單字資訊"
                            >
                                🤖 自動填入
                            </button>
                        </div>
                        <small>使用 Free Dictionary API 自動填入其他欄位</small>
                    </div>

                    <div class="form-group">
                        <label for="translation-input">中文翻譯 *</label>
                        <input 
                            type="text" 
                            id="translation-input" 
                            placeholder="輸入中文翻譯" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="pos-input">詞性</label>
                        <input 
                            type="text" 
                            id="pos-input" 
                            placeholder="例如: noun, verb, adjective" 
                        >
                    </div>

                    <div class="form-group">
                        <label for="root-input">字根分析</label>
                        <textarea 
                            id="root-input" 
                            placeholder="輸入字根分析（可選）" 
                            rows="3"
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="example-input">例句</label>
                        <textarea 
                            id="example-input" 
                            placeholder="輸入例句（可選）" 
                            rows="3"
                        ></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="submit-btn">💾 儲存單字</button>
                        <button type="reset" class="reset-btn">清空表單</button>
                    </div>
                </form>

                <!-- 狀態提示 -->
                <div id="form-status" class="form-status"></div>

                <!-- 單字列表 -->
                <div class="words-list-section">
                    <h2>已新增單字 (<span id="words-count">0</span>)</h2>
                    <div id="words-list" class="words-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
