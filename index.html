<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英文單字背誦 App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="app-subtitle">純前端單字背誦工具</p>
        <h1>英文單字卡片</h1>
        <p class="app-description">中央為翻頁單字卡，右側有管理頁面，可新增單字、查閱翻譯與例句。</p>
      </div>
      <div class="view-switch" role="tablist" aria-label="頁面切換">
        <button type="button" class="tab-button active" data-target="studyView" role="tab" aria-selected="true">學習</button>
        <button type="button" class="tab-button" data-target="manageView" role="tab" aria-selected="false">管理</button>
      </div>
    </header>

    <main class="app-main">
      <section id="studyView" class="panel active" aria-labelledby="study-tab">
        <div class="card-panel">
          <div class="flip-card" id="flipCard" tabindex="0" aria-label="單字卡，按 Enter 鍵或點擊翻面">
            <div class="flip-card-inner">
              <div class="flip-card-front">
                <div class="card-title" id="cardWord">example</div>
                <div class="card-label">英文單字</div>
                <div class="card-content" id="cardFrontNote">點擊卡片查看翻譯、詞性、例句與字根分析。</div>
              </div>
              <div class="flip-card-back">
                <div class="card-title" id="cardTranslation">範例</div>
                <div class="card-label">翻譯</div>
                <div class="card-content" id="cardBackContent"></div>
              </div>
            </div>
          </div>
          <div class="hint">點擊卡片或按 Enter 翻面</div>
        </div>

        <div class="study-actions">
          <button type="button" class="button secondary" id="prevWord">上一個</button>
          <span id="currentInfo" class="current-info">尚無儲存單字</span>
          <button type="button" class="button secondary" id="nextWord">下一個</button>
        </div>
      </section>

      <section id="manageView" class="panel" aria-labelledby="manage-tab">
        <div class="manage-panel">
          <div class="panel-header">
            <h2>管理單字</h2>
            <p>新增單字或直接使用「自動填入」由 API 補全翻譯、詞性、例句與字根分析。</p>
          </div>

          <form id="wordForm" class="formula-form">
            <label>
              英文單字
              <input type="text" id="englishWord" placeholder="例如：gravity" autocomplete="off" />
            </label>
            <label>
              翻譯
              <input type="text" id="translation" placeholder="自動填入翻譯" />
            </label>
            <label>
              詞性
              <input type="text" id="partOfSpeech" placeholder="自動填入詞性" />
            </label>
            <label>
              例句
              <textarea id="exampleSentence" rows="3" placeholder="自動填入例句"></textarea>
            </label>
            <label>
              字根分析
              <textarea id="rootAnalysis" rows="3" placeholder="自動填入字根分析"></textarea>
            </label>

            <div class="button-group">
              <button type="button" id="autoFillButton" class="button primary">自動填入</button>
              <button type="submit" class="button secondary">新增單字</button>
            </div>
            <div id="statusMessage" class="status-message" aria-live="polite"></div>
          </form>

          <div class="formula-list-panel">
            <h3>已儲存單字</h3>
            <ul id="wordList" class="formula-list">
              <li class="empty-state">目前尚未新增單字</li>
            </ul>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
